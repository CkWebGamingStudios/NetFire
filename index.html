<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://js.puter.com/v2/"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: normal;
            margin-bottom: 20px;
        }

        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .categories::-webkit-scrollbar {
            height: 5px;
        }

        .categories::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .categories::-webkit-scrollbar-thumb {
            background: #444;
        }

        .category-btn {
            background: #2a2a2a;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .category-btn:hover {
            background: #3a3a3a;
        }

        .category-btn.active {
            background: #fff;
            color: #000;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .app-card {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .app-card:hover {
            transform: scale(1.05);
            background: #252525;
        }

        .app-card:focus {
            outline: 2px solid #fff;
        }

        .app-logo {
            width: 100%;
            height: 100px;
            background: #2a2a2a;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-name {
            font-size: 0.95rem;
            font-weight: normal;
            text-align: center;
        }

        iframe {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1000;
            background: #000;
        }

        .close-btn {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 1001;
            font-size: 1rem;
        }

        .close-btn:hover {
            background: #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Apps & Games Launcher</h1>
        </header>

        <div class="categories" id="categories"></div>
        <div class="apps-grid" id="appsGrid"></div>
    </div>

    <button class="close-btn" id="closeBtn">Close</button>
    <iframe id="appFrame"></iframe>

    <script>
        console.log("🚀 Launcher script initiated successfully.");
        let appsData = [];
        let currentCategory = 'all';

        // Load apps data from JSON configuration file
        async function loadApps() {
            console.log("📥 Fetching apps.json...");
            try {
                const response = await fetch('apps.json');
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log("✅ JSON parsed successfully:", data);
                
                // Handle nested or flat structural formatting
                appsData = Array.isArray(data[0]) ? data.flat() : data;
                console.log(`📦 Loaded ${appsData.length} apps from file.`);
                
                renderCategories();
                renderApps();
            } catch (error) {
                console.error("❌ Failed to parse/load apps.json. Falling back to recovery data:", error);
                loadBackupData();
            }
        }

        // Hardcoded recovery dataset if Cloudflare network drops apps.json file
        function loadBackupData() {
            console.warn("⚠️ Injecting recovery backup dataset to restore screen interface.");
            appsData = [
                {
                    "name": "NetMirror",
                    "logo": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKXAeXvm1XEDt6TJJBo4nmFGp7WrzfR_JYlQ&s",
                    "url": "https://net22.cc",
                    "category": "movie-streaming"
                },
                {
                    "name": "Minecraft Web Client",
                    "logo": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScI9axTRSXG-LyFqfzJUDIUSgud1qRL0oX-Q&s",
                    "url": "https://mcraft.fun/",
                    "category": "games"
                }
            ];
            renderCategories();
            renderApps();
        }

        // Render categorical sorting controllers
        function renderCategories() {
            console.log("🛠️ Building sorting categories...");
            const categoriesContainer = document.getElementById('categories');
            if (!categoriesContainer) return console.error("❌ UI Element '#categories' missing from HTML layout!");

            const rawCategories = appsData.map(app => app.category).filter(Boolean);
            const uniqueCategories = ['all', ...new Set(rawCategories)];
            
            categoriesContainer.innerHTML = '';
            uniqueCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${category === currentCategory ? 'active' : ''}`;
                btn.textContent = category.replace('-', ' ');
                
                btn.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = category;
                    renderApps();
                };
                
                categoriesContainer.appendChild(btn);
            });
            console.log("✅ Category interface elements populated.");
        }

        // Render card elements onto display workspace grid 
        function renderApps() {
            console.log(`🖼️ Rendering apps grid for category: [${currentCategory}]`);
            const appsGrid = document.getElementById('appsGrid');
            if (!appsGrid) return console.error("❌ UI Element '#appsGrid' missing from HTML layout!");

            appsGrid.innerHTML = '';

            const filteredApps = currentCategory === 'all' 
                ? appsData 
                : appsData.filter(app => app.category === currentCategory);

            if (filteredApps.length === 0) {
                appsGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px;">No applications found inside this configuration scope.</div>`;
                return;
            }

            filteredApps.forEach(app => {
                if (!app) return;

                const card = document.createElement('div');
                card.className = 'app-card';
                card.tabIndex = 0;
                card.onclick = () => openApp(app.url);
                card.onkeydown = (e) => { if (e.key === 'Enter') openApp(app.url); };
                
                card.innerHTML = `
                    <div class="app-logo">
                        <img src="${app.logo}" alt="${app.name}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect width=%22100%22 height=%22100%22 fill=%22%23333%22/><text x=%2250%25%22 y=%2255%25%22 font-family=%22Arial%22 font-size=%2212%22 fill=%22%23aaa%22 text-anchor=%22middle%22>No Preview</text></svg>';">
                    </div>
                    <div class="app-name">${app.name}</div>
                `;
                
                appsGrid.appendChild(card);
            });
            console.log("✅ App grid population sequence finished.");
        }

        // Open app frame pipeline
        async function openApp(url) {
    console.log(`🛰️ Routing destination target via Puter.js proxy: ${url}`);
    const iframe = document.getElementById('appFrame');
    const closeBtn = document.getElementById('closeBtn');
    
    if (!iframe || !closeBtn) return console.error("❌ Viewport elements layout missing!");

    // Show the window workspace and display a loading indicator if necessary
    iframe.style.display = 'block';
    closeBtn.style.display = 'block';

    try {
        // 1. Fetch the remote site content through Puter's unrestricted network stack
        const response = await puter.net.fetch(url);
        let htmlText = await response.text();
        
        // 2. Format a clean destination reference for asset routing
        const baseOrigin = url.endsWith('/') ? url : url + '/';
        
        // 3. Inject the <base> tag right at the top of the head block so relative resources load
        const baseTag = `<head><base href="${baseOrigin}">`;
        if (htmlText.includes("<head>")) {
            htmlText = htmlText.replace("<head>", baseTag);
        } else if (htmlText.includes("<HEAD>")) {
            htmlText = htmlText.replace("<HEAD>", baseTag);
        } else {
            htmlText = `<base href="${baseOrigin}">` + htmlText;
        }

        // 4. Safely pipe the fully rendered and compiled source right into the iframe view
        const blob = new Blob([htmlText], { type: 'text/html' });
        iframe.src = URL.createObjectURL(blob);
        console.log("✅ Site source successfully virtualized and painted via Puter environment client.");

    } catch (error) {
        console.error("❌ Puter retrieval execution failed:", error);
        iframe.srcdoc = `<div style="color: white; text-align: center; padding: 50px; font-family: Arial;">
            <h3>Failed to load application via cloud proxy</h3>
            <p>${error.message}</p>
        </div>`;
    }
}

        // Close app frame layout sequence
        document.getElementById('closeBtn').onclick = function() {
            console.log("🔌 Unmounting app window frame.");
            const iframe = document.getElementById('appFrame');
            const closeBtn = document.getElementById('closeBtn');
            
            iframe.style.display = 'none';
            closeBtn.style.display = 'none';
            iframe.src = '';
        };

        // Initialize execution run
        loadApps();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apps & Games Launcher</title>
    <script src="https://js.puter.com/v2/"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: normal;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }

        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .categories::-webkit-scrollbar {
            height: 5px;
        }

        .categories::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .categories::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 4px;
        }

        .category-btn {
            background: #2a2a2a;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: background 0.2s, color 0.2s;
        }

        .category-btn:hover {
            background: #3a3a3a;
        }

        .category-btn.active {
            background: #fff;
            color: #000;
            font-weight: bold;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .app-card {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid #222;
        }

        .app-card:hover {
            transform: scale(1.04);
            background: #252525;
            border-color: #444;
        }

        .app-card:focus {
            outline: 2px solid #fff;
        }

        .app-logo {
            width: 100%;
            height: 100px;
            background: #2a2a2a;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 5px;
        }

        .app-name {
            font-size: 0.95rem;
            font-weight: normal;
            text-align: center;
            color: #ccc;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        .app-card:hover .app-name {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Apps & Games Launcher</h1>
        </header>

        <div class="categories" id="categories"></div>
        <div class="apps-grid" id="appsGrid"></div>
    </div>

    <script>
        // Silence Puter submission reminders in console logs
        if (window.puter) {
            puter.quiet = true;
        }
        
        console.log("🚀 Launcher script initiated successfully.");
        let appsData = [];
        let currentCategory = 'all';

        // Fetch application setup data
        async function loadApps() {
            console.log("📥 Fetching apps.json...");
            try {
                const response = await fetch('apps.json');
                if (!response.ok) {
                    throw new Error(`HTTP Error Status: ${response.status}`);
                }
                
                const data = await response.json();
                console.log("✅ JSON parsed successfully:", data);
                
                // Flatten array configuration maps if multi-bracketed
                appsData = Array.isArray(data[0]) ? data.flat() : data;
                console.log(`📦 Loaded ${appsData.length} apps from file.`);
                
                renderCategories();
                renderApps();
            } catch (error) {
                console.error("❌ Failed to parse/load apps.json. Falling back to recovery data:", error);
                loadBackupData();
            }
        }

        // Offline / Network Failure Recovery Mode
        function loadBackupData() {
            console.warn("⚠️ Injecting recovery backup dataset to restore screen interface.");
            appsData = [
                {
                    "name": "Minecraft Web Client",
                    "logo": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcScI9axTRSXG-LyFqfzJUDIUSgud1qRL0oX-Q&s",
                    "url": "https://mcraft.fun/",
                    "category": "games"
                },
                {
                    "name": "SteamRip",
                    "logo": "https://steamrip.com/wp-content/uploads/2021/06/Site-logo3.png.webp",
                    "url": "https://steamrip.com/",
                    "category": "game-download"
                }
            ];
            renderCategories();
            renderApps();
        }

        // Render dynamic filter arrays
        function renderCategories() {
            console.log("🛠️ Building sorting categories...");
            const categoriesContainer = document.getElementById('categories');
            if (!categoriesContainer) return console.error("❌ UI Element '#categories' missing from HTML layout!");

            const rawCategories = appsData.map(app => app.category).filter(Boolean);
            const uniqueCategories = ['all', ...new Set(rawCategories)];
            
            categoriesContainer.innerHTML = '';
            uniqueCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${category === currentCategory ? 'active' : ''}`;
                btn.textContent = category.replace('-', ' ');
                
                btn.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = category;
                    renderApps();
                };
                
                categoriesContainer.appendChild(btn);
            });
            console.log("✅ Category interface elements populated.");
        }

        // Mount program cards onto display viewport grid 
        function renderApps() {
            console.log(`🖼️ Rendering apps grid for category: [${currentCategory}]`);
            const appsGrid = document.getElementById('appsGrid');
            if (!appsGrid) return console.error("❌ UI Element '#appsGrid' missing from HTML layout!");

            appsGrid.innerHTML = '';

            const filteredApps = currentCategory === 'all' 
                ? appsData 
                : appsData.filter(app => app.category === currentCategory);

            if (filteredApps.length === 0) {
                appsGrid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #888; padding: 40px;">No applications configured in this layout bracket.</div>`;
                return;
            }

            filteredApps.forEach(app => {
                if (!app) return;

                const card = document.createElement('div');
                card.className = 'app-card';
                card.tabIndex = 0;
                card.onclick = () => openApp(app.url);
                card.onkeydown = (e) => { if (e.key === 'Enter') openApp(app.url); };
                
                card.innerHTML = `
                    <div class="app-logo">
                        <img src="${app.logo}" alt="${app.name}" onerror="this.onerror=null; this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect width=%22100%22 height=%22100%22 fill=%22%23333%22/><text x=%2250%25%22 y=%2255%25%22 font-family=%22Arial%22 font-size=%2212%22 fill=%22%23aaa%22 text-anchor=%22middle%22>No Preview</text></svg>';">
                    </div>
                    <div class="app-name">${app.name}</div>
                `;
                
                appsGrid.appendChild(card);
            });
            console.log("✅ App grid population sequence finished.");
        }

        // Native Puter UI Desktop Launch Mechanism
        // Native Puter UI Desktop Window Spawner (V2 Fixed)
// Lightweight, browser-native container spawner
// Lightweight, browser-native container spawner with event interception
function openApp(url, event) {
    // Stop the browser from triggering default link behavior or bubbling up
    if (event) {
        event.preventDefault();
        event.stopPropagation();
    }

    console.log(`🛰️ Spawning target destination via untracked environment channel: ${url}`);
    
    try {
        // Use window.open with strict configuration properties to clean tracking footprints
        const appInstance = window.open(
            url, 
            '_blank', 
            'noopener=yes,noreferrer=yes,menubar=yes,toolbar=yes,location=yes,status=yes'
        );
        
        if (appInstance) {
            console.log("✅ App isolated window successfully initiated via browser window layer.");
        } else {
            // If a browser popup blocker stops the window pop-up, ONLY THEN redirect the main tab
            console.warn("⚠️ Window block detected. Forcing redirect pipeline fallback inside current window.");
            window.location.href = url;
        }
    } catch (error) {
        console.error("❌ Isolated window deployment failed:", error);
        window.open(url, '_blank', 'noopener=yes,noreferrer=yes');
    }
}
        // Kick off execution sequence
        loadApps();
    </script>
</body>
</html>

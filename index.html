<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Launcher</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #0f0f0f;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        header {
            margin-bottom: 30px;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: normal;
            margin-bottom: 20px;
        }

        .categories {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .categories::-webkit-scrollbar {
            height: 5px;
        }

        .categories::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        .categories::-webkit-scrollbar-thumb {
            background: #444;
        }

        .category-btn {
            background: #2a2a2a;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: background 0.2s;
        }

        .category-btn:hover {
            background: #3a3a3a;
        }

        .category-btn.active {
            background: #fff;
            color: #000;
        }

        .apps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .app-card {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        .app-card:hover {
            transform: scale(1.05);
            background: #252525;
        }

        .app-card:focus {
            outline: 2px solid #fff;
        }

        .app-logo {
            width: 100%;
            height: 100px;
            background: #2a2a2a;
            border-radius: 6px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .app-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .app-name {
            font-size: 0.95rem;
            font-weight: normal;
            text-align: center;
        }

        iframe {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1000;
            background: #000;
        }

        .close-btn {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: #fff;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            z-index: 1001;
            font-size: 1rem;
        }

        .close-btn:hover {
            background: #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Apps & Games Launcher</h1>
        </header>

        <div class="categories" id="categories"></div>
        <div class="apps-grid" id="appsGrid"></div>
    </div>

    <button class="close-btn" id="closeBtn">Close</button>
    
    <webview id="appFrame" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:1000; background:#000;"></webview>

                // Flatten data arrays if nested matrix parsed

                renderCategories();
                renderApps();
            } catch (error) {
                console.error('Error loading apps.json, falling back to local demo data:', error);
                loadDemoData();
            }

        // Generate categorical interface controllers based on loaded entries
        function renderCategories() {
            const categoriesContainer = document.getElementById('categories');
            
            // Extract distinct target string entries dynamically
            const rawCategories = appsData.map(app => app.category).filter(Boolean);
            const uniqueCategories = ['all', ...new Set(rawCategories)];
            
            categoriesContainer.innerHTML = '';
            uniqueCategories.forEach(category => {
                const btn = document.createElement('button');
                btn.className = `category-btn ${category === currentCategory ? 'active' : ''}`;
                btn.textContent = category.replace('-', ' ');
                
                btn.onclick = () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = category;
                    renderApps();
                };
                
                categoriesContainer.appendChild(btn);
            });
        }

        // Render card layouts onto grid tracking currentCategory
        function renderApps() {
            const appsGrid = document.getElementById('appsGrid');
            appsGrid.innerHTML = '';

            const filteredApps = currentCategory === 'all' 
                ? appsData 
                : appsData.filter(app => app.category === currentCategory);

            filteredApps.forEach(app => {
                if (!app) return;

                const card = document.createElement('div');
                card.className = 'app-card';
                card.tabIndex = 0;
                card.onclick = () => openApp(app.url);
                
                // Keyboard accessibility hook for clean controls navigation
                card.onkeydown = (e) => { if (e.key === 'Enter') openApp(app.url); };
                
                card.innerHTML = `
                    <div class="app-logo">
                        <img src="${app.logo}" alt="${app.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect width=%22100%22 height=%22100%22 fill=%22%23333%22/><text x=%2250%25%22 y=%2255%25%22 font-family=%22Arial%22 font-size=%2212%22 fill=%22%23aaa%22 text-anchor=%22middle%22>No Preview</text></svg>'">
                    </div>
                    <div class="app-name">${app.name}</div>
                `;
                
                appsGrid.appendChild(card);
            });
        }

        // Pipe destination target inside Full-Screen Frame using serverless proxy functions
function openApp(url) {
    const webview = document.getElementById('appFrame');
    const closeBtn = document.getElementById('closeBtn');

    webview.src = url; // Directly loads secure HTTPS/HTTP links cleanly
    webview.style.display = 'block';
    closeBtn.style.display = 'block';
}

        // Clear view target state definitions
        document.getElementById('closeBtn').onclick = function() {
            const iframe = document.getElementById('appFrame');
            const closeBtn = document.getElementById('closeBtn');
            
            iframe.style.display = 'none';
            closeBtn.style.display = 'none';
            iframe.src = '';
        };

        // Run application script setup cycle
        loadApps();
    </script>
